<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Your Name | Professional Portfolio</title>
    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(145deg, #e9f3e6 0%, #dde9da 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: #2c3e2f;
        }

        /* Sage green pastel palette */
        .card {
            max-width: 880px;
            width: 100%;
            background: #fefef7;
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 35px -12px rgba(60, 70, 50, 0.12), 0 1px 2px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .intro {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .avatar {
            font-size: 3.8rem;
            background: #e2ecd9;
            width: 100px;
            height: 100px;
            line-height: 100px;
            text-align: center;
            border-radius: 50%;
            margin: 0 auto 1.2rem;
            color: #5b7c5c;
            box-shadow: 0 8px 14px rgba(0,0,0,0.02);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #3c6b47;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 400;
            color: #6b8f6e;
            background: #eef5ea;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            margin-top: 0.5rem;
        }

        .description {
            margin-top: 1.5rem;
            font-size: 1rem;
            line-height: 1.5;
            color: #4a5e48;
            max-width: 540px;
            margin-left: auto;
            margin-right: auto;
        }

        hr {
            margin: 1.8rem 0;
            border: none;
            height: 2px;
            background: linear-gradient(90deg, #dfecda, #c2d3bb, #dfecda);
        }

        /* Buttons grid - now with more columns */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin: 1.8rem 0 0.8rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #ffffff;
            border: 1px solid #cfdec6;
            padding: 0.85rem 0.5rem;
            border-radius: 60px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            color: #3c6b47;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .btn i {
            font-size: 1.1rem;
            color: #8bb56a;
            transition: color 0.2s;
        }

        .btn:hover {
            background: #f9fef5;
            border-color: #afcaa2;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
        }

        .btn:hover i {
            color: #5c8f4c;
        }

        .footer-note {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #98ae8b;
            letter-spacing: 0.3px;
        }

        @media (max-width: 620px) {
            .card {
                padding: 1.8rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .buttons-grid {
                gap: 0.8rem;
            }
            .btn {
                padding: 0.7rem 0.3rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="intro">
            <div class="avatar">
                <i class="fas fa-seedling"></i>
            </div>
            <h1>Alex Johnson</h1>
            <div class="tagline">
                <i class="fas fa-map-pin"></i> Researcher &nbsp;|&nbsp; China Studies
            </div>
            <div class="description">
                Welcome to my professional hub. I focus on cross-cultural insights, 
                China's political economy, and digital transformation.
            </div>
        </div>

        <hr />

        <div class="buttons-grid">
            <!-- CV button -->
            <a href="#" class="btn" id="cvButton">
                <i class="fas fa-file-alt"></i> Download CV
            </a>

            <!-- LinkedIn button -->
            <a href="#" class="btn" id="linkedinButton">
                <i class="fab fa-linkedin-in"></i> LinkedIn
            </a>

            <!-- Email button -->
            <a href="#" class="btn" id="emailButton">
                <i class="fas fa-envelope"></i> Email
            </a>

            <!-- KCL China Studies Society -->
            <a href="#" class="btn" id="kclButton">
                <i class="fas fa-university"></i> KCL China Studies
            </a>

            <!-- NEW: Publications button -->
            <a href="#" class="btn" id="publicationsButton">
                <i class="fas fa-book-open"></i> Publications
            </a>

            <!-- NEW: GitHub button -->
            <a href="#" class="btn" id="githubButton">
                <i class="fab fa-github"></i> GitHub
            </a>

            <!-- NEW: Services button -->
            <a href="#" class="btn" id="servicesButton">
                <i class="fas fa-hand-sparkles"></i> Services
            </a>
        </div>

        <div class="footer-note">
            <i class="fas fa-leaf"></i> Let's cultivate meaningful work
        </div>
    </div>

    <script>
        // ==============================================
        // 🔁 REPLACE THESE LINKS WITH YOUR REAL ONES
        // ==============================================

        // Existing links
        const CV_LINK = "cv_example.pdf";                // e.g., "cv_john.pdf"
        const LINKEDIN_URL = "https://www.linkedin.com/in/yourprofile/";
        const EMAIL_ADDRESS = "your.email@example.com";
        const KCL_WEBSITE = "https://www.kclsu.org/groups/activities/society/china-studies/";

        // 🆕 New links for the added buttons
        const PUBLICATIONS_LINK = "https://scholar.google.com/citations?user=yourID";  // or a page listing your papers
        const GITHUB_URL = "https://github.com/meilindev";                            // your GitHub profile
        const SERVICES_LINK = "https://yourwebsite.com/services";                     // link to consulting/services page

        // ----------------------------------------------
        // Assign click handlers
        // ----------------------------------------------

        // CV
        document.getElementById('cvButton')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (CV_LINK && CV_LINK !== "cv_example.pdf") window.open(CV_LINK, '_blank');
            else alert("📄 CV link not configured. Please replace CV_LINK with your actual CV file path.");
        });

        // LinkedIn
        document.getElementById('linkedinButton')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (LINKEDIN_URL && LINKEDIN_URL !== "https://www.linkedin.com/in/yourprofile/") window.open(LINKEDIN_URL, '_blank');
            else alert("🔗 LinkedIn URL not set. Edit the script.");
        });

        // Email
        document.getElementById('emailButton')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (EMAIL_ADDRESS && EMAIL_ADDRESS !== "your.email@example.com") window.location.href = `mailto:${EMAIL_ADDRESS}`;
            else alert("✉️ Email address not set.");
        });

        // KCL China Studies
        document.getElementById('kclButton')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (KCL_WEBSITE && KCL_WEBSITE !== "https://www.kclsu.org/groups/activities/society/china-studies/") window.open(KCL_WEBSITE, '_blank');
            else alert("🌐 KCL website link not configured.");
        });

        // 🆕 Publications
        document.getElementById('publicationsButton')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (PUBLICATIONS_LINK && PUBLICATIONS_LINK !== "https://scholar.google.com/citations?user=yourID") window.open(PUBLICATIONS_LINK, '_blank');
            else alert("📚 Publications link not set. Add your Google Scholar or personal publication page.");
        });

        // 🆕 GitHub
        document.getElementById('githubButton')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (GITHUB_URL && GITHUB_URL !== "https://github.com/meilindev") window.open(GITHUB_URL, '_blank');
            else alert("🐙 GitHub URL not set. Update GITHUB_URL with your profile.");
        });

        // 🆕 Services
        document.getElementById('servicesButton')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (SERVICES_LINK && SERVICES_LINK !== "https://yourwebsite.com/services") window.open(SERVICES_LINK, '_blank');
            else alert("🛠️ Services page link not configured. Add your consulting or service page.");
        });
    </script>
</body>
</html>
